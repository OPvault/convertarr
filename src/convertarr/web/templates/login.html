<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign in — Convertarr</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/svg+xml" href="/static/icon.svg">
    <link rel="stylesheet" href="/static/app.css">
</head>
<body class="auth-body">
    <main class="auth-card">
        <div class="auth-brand">
            <img class="logo logo-lg" src="/static/icon.svg" alt="Convertarr">
            <span class="brand-text">Convertarr</span>
        </div>
        <h1 style="margin: 0 0 1rem; font-size: 1.2rem; font-weight: 600">Sign in</h1>
        {% if error %}
            <div class="auth-error">Invalid username or password.</div>
        {% endif %}
        <form method="post" action="/login">
            <input type="hidden" name="next" value="{{ next }}">
            <div class="form-row">
                <label>Username</label>
                <input type="text" name="username" autocomplete="username" autofocus required>
            </div>
            <div class="form-row">
                <label>Password</label>
                <input type="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" style="width: 100%">Sign in</button>
        </form>
    </main>
</body>
</html>
