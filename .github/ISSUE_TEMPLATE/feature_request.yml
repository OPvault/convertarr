name: Feature request
description: Suggest a new feature or an improvement to an existing one.
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Convertarr is intentionally focused — pre-encoding for the *arr stack, driven by workflows. Features that broaden the scope (becoming a media server, replacing Tdarr, etc.) are unlikely to land. That doesn't mean don't ask, just calibrate expectations.

        Please [search existing issues and discussions](https://github.com/opvault/convertarr/issues?q=) first.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I have searched existing issues and discussions for similar requests.
          required: true
        - label: This is not a bug report (use the bug template instead).
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation that prompted this request. "I want X" is less useful than "When I do Y, Z is painful because…".
      placeholder: |
        When I have hundreds of episodes that all need the same conversion, I have to wait for ingest to ffprobe each one before anything starts encoding.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you'd like it to work. UI changes, new settings, new workflow operators, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, or workarounds you're using today.
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Mockups, links to similar features in other tools, etc.
    validations:
      required: false
